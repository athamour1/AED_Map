# AED Map — single-domain, path-based routing (see plan §1/§7).
#   /       -> apps/public static build (no auth)
#   /admin/ -> apps/admin static build  (added in Milestone 5, JWT auth)
#   /api/   -> apps/api (NestJS), proxied
#
# Replace `your-domain.example` below with the real domain before first deploy.
#
# Bootstrapping TLS (one-time, manual, on the VPS):
#   1. Comment out the `listen 443 ssl;` server block below (it will fail to start —
#      no certificate exists yet).
#   2. `docker compose up -d nginx` with only the port-80 block active.
#   3. `docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d your-domain.example`
#   4. Uncomment the 443 server block, `docker compose restart nginx`.
#   5. `certbot`'s renew loop (already running as its own compose service) keeps it current;
#      nginx does not reload automatically on renewal — see the certbot service's reload hook.

server {
    listen 80;
    server_name your-domain.example;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.example;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;

    # Public map — static SPA, no auth.
    location / {
        root /srv/public;
        try_files $uri $uri/ /index.html;
    }

    # Admin panel — static SPA, JWT auth handled client-side. Added in Milestone 5;
    # until apps/admin exists this directory won't be populated by CI.
    location /admin/ {
        alias /srv/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Backend API — same origin as both frontends above, so no CORS is needed.
    location /api/ {
        proxy_pass http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
